################
### DISPLAYS ###
################

monitor = , preferred, auto, 1
# monitor = DP-2, 2560x1440@180.06, -2560x0, 1, bitdepth, 10, cm, srgb
monitor = eDP-1, 3200x2000@165.00, 0x0, 2, bitdepth, 10, cm, dcip3
# monitor = eDP-1, disable
monitor = DP-1, 2560x1440@180.06, -2560x0, 1, bitdepth, 10, cm, srgb
monitor = DP-5, 2560x1440@180.06, -2560x0, 1, bitdepth, 10, cm, srgb
# monitor = eDP-2, 3200x2000@165.00, 0x0, 2, bitdepth, 10, cm, dcip3


#####################
### LOOK AND FEEL ###
#####################

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(88C0D0ee)
    col.inactive_border = rgba(4C566Aaa)
    resize_on_border = true
    layout = dwindle
}

decoration {
    rounding = 8
    rounding_power = 2
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = false
    }

    blur {
        enabled = false
    }
}

animations {
    enabled = yes, please :)
    bezier = easeOutQuint,0.23,1,0.32,1
    bezier = easeInOutCubic,0.65,0.05,0.36,1
    bezier = linear,0,0,1,1
    bezier = almostLinear,0.5,0.5,0.75,1.0
    bezier = quick,0.15,0,0.1,1

    animation = global, 1, 10, default
    animation = border, 1, 5.39, easeOutQuint
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, linear, popin 87%
    animation = fadeIn, 1, 1.73, almostLinear
    animation = fadeOut, 1, 1.46, almostLinear
    animation = fade, 1, 3.03, quick
    animation = layers, 1, 3.81, easeOutQuint
    animation = layersIn, 1, 4, easeOutQuint, fade
    animation = layersOut, 1, 1.5, linear, fade
    animation = fadeLayersIn, 1, 1.79, almostLinear
    animation = fadeLayersOut, 1, 1.39, almostLinear
    animation = workspaces, 1, 1.94, almostLinear, fade
    animation = workspacesIn, 1, 1.21, almostLinear, fade
    animation = workspacesOut, 1, 1.94, almostLinear, fade
}

dwindle {
    pseudotile = false
    preserve_split = false
    force_split = 2
}

master {
    new_status = slave
    mfact = 0.55
}


#############
### INPUT ###
#############

input {
    repeat_delay = 200
    repeat_rate = 75
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =
    numlock_by_default = true
    follow_mouse = 1

    sensitivity = 0.15 # -1.0 - 1.0, 0 means no modification.
    accel_profile = flat

    touchpad {
        natural_scroll = true
        scroll_factor = 0.4
    }
}


########################
### DEFAULT PROGRAMS ###
########################

$terminal = uwsm app -- alacritty
$fileManager = uwsm app -- thunar
$menu = uwsm app -- fuzzel "--launch-prefix=uwsm app --"
$browser = uwsm app -- zen-browser


###################
### KEYBINDINGS ###
###################

$mainMod = SUPER
gesture = 3, horizontal, workspace
gesture = 3, up, dispatcher, fullscreen, 1
gesture = 3, down, dispatcher, killactive,
gesture = 4, left, dispatcher, movetoworkspace, r-1
gesture = 4, right, dispatcher, movetoworkspace, r+1
bind = $mainMod, W, exec, $terminal -e tmux new-session -A -s misc
bind = $mainMod, A, exec, $browser
bind = , PRINT, exec, hyprshot -m region -z --clipboard-only
bind = $mainMod, Q, killactive,
bind = $mainMod SHIFT , Q, forcekillactive,
bind = $mainMod, D, exec, uwsm app -- wlogout
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, F, togglefloating,
bind = $mainMod, R, exec, $menu
bind = $mainMod, M, fullscreen, 1
bind = , F11, fullscreen, 0
bind = $mainMod, P, exec, uwsm app -- nwg-displays
bind = $mainMod, C, exec, uwsm app -- hyprpicker -a
bind = $mainMod, V, exec, uwsm app -- cliphist list | fuzzel --dmenu | cliphist decode | wl-copy
bind = $mainMod SHIFT, V, exec, cliphist wipe
bind = $mainMod, PERIOD, exec, uwsm app -- smile
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d
bind = $mainMod SHIFT, h, movewindow, l
bind = $mainMod SHIFT, j, movewindow, d
bind = $mainMod SHIFT, k, movewindow, u
bind = $mainMod SHIFT, l, movewindow, r
bind = $mainMod CTRL, h, movecurrentworkspacetomonitor, l
bind = $mainMod CTRL, l, movecurrentworkspacetomonitor, r
bind = $mainMod, B, exec, hyprctl keyword general:layout "$(hyprctl getoption general:layout | rg -q dwindle && echo master || echo dwindle)"
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl s 10%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl s 10%-
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous


##############################
### WINDOWS AND WORKSPACES ###
##############################

windowrule {
    name = no_maximize
    match:class = *
}

windowrule {
    name = float_smile
    match:class = it.mijorus.smile
    float = on
}

windowrule {
    name = float_adb_emu
    match:class = Emulator
    float = on
}

windowrule {
    name = game_mouse_grab
    match:class = gamescope
    match:xdg_tag = proton-game
    fullscreen = on
    fullscreen_state = 3
    immediate = on
    no_anim = on
}

windowrule {
    name = float_gtk_portal
    match:class = xdg-desktop-portal-gtk
    float = on
}


#####################
### MISCELLANEOUS ###
#####################

ecosystem {
    no_update_news = true
    no_donation_nag = true
}

# xwayland {
#     force_zero_scaling = true
# }

misc {
    disable_hyprland_logo = true
    force_default_wallpaper = -1
    disable_splash_rendering = true
    enable_anr_dialog = false
    # vrr = 2
}


