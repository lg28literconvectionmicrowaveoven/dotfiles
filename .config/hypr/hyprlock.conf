# --- NORD COLOR PALETTE ---
$nord0  = rgb(46, 52, 64)    # Polar Night - Darkest
$nord1  = rgb(59, 66, 82)    # Polar Night
$nord2  = rgb(67, 76, 94)    # Polar Night
$nord3  = rgb(76, 86, 106)   # Polar Night - Lightest
$nord4  = rgb(216, 222, 233) # Snow Storm
$nord5  = rgb(229, 233, 240) # Snow Storm
$nord6  = rgb(236, 239, 244) # Snow Storm - Brightest
$nord7  = rgb(143, 188, 187) # Frost - Teal
$nord8  = rgb(136, 192, 208) # Frost - Cyan
$nord9  = rgb(129, 161, 193) # Frost - Blue
$nord10 = rgb(94, 129, 172)  # Frost - Dark Blue
$nord11 = rgb(191, 97, 106)  # Aurora - Red
$nord12 = rgb(208, 135, 112) # Aurora - Orange
$nord13 = rgb(235, 203, 139) # Aurora - Yellow
$nord14 = rgb(163, 190, 140) # Aurora - Green
$nord15 = rgb(180, 142, 173) # Aurora - Purple

# --- SEMANTIC COLOR VARIABLES ---
$bg_primary       = $nord0   # Main background
$bg_secondary     = $nord1   # Input field background
$text_primary     = $nord6   # Brightest text (time)
$text_secondary   = $nord4   # Secondary text
$accent_primary   = $nord8   # Main accent (frost cyan)
$accent_secondary = $nord9   # Secondary accent (frost blue)
$accent_tertiary  = $nord7   # Tertiary accent (frost teal)
$success_color    = $nord14  # Success/check state
$error_color      = $nord11  # Error/fail state
$warning_color    = $nord13  # Warning/highlight

# --- BACKGROUND ---
background {
    monitor =
    path = /home/sabari/Pictures/bg.jpg
    color = $bg_primary
    blur_passes = 3
    blur_size = 4
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# --- TIME (Top) ---
label {
    monitor =
    text = $TIME
    color = $text_primary
    font_size = 180
    font_family = Adwaita Sans ExtraBold
    position = 0, 16%
    halign = center
    valign = center
}

# --- DATE (Below Time) ---
label {
    monitor =
    text = cmd[update:1000] echo "$(date '+%A, %B %d')"
    color = $accent_secondary
    font_size = 32
    font_family = JetBrainsMono Nerd Font Mono
    position = 0, 8%
    halign = center
    valign = center
}

# --- LOCK ICON (Above Input) ---
label {
    monitor =
    text = 󰌾
    color = $accent_primary
    font_size = 56
    font_family = JetBrainsMono Nerd Font Mono
    position = 0, 3%
    halign = center
    valign = center
}

# --- GREETING (Inside/Above Input Context) ---
label {
    monitor =
    text = 󱂯 Logged in as $USER
    color = $text_secondary
    font_size = 32
    font_family = JetBrainsMono Nerd Font Mono
    position = 0, -2%
    halign = center
    valign = center
}

# --- INPUT FIELD (Center) ---
input-field {
    monitor =
    size = 25%, 5%
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.2
    dots_center = true
    
    outer_color = $accent_secondary
    inner_color = $bg_secondary
    font_color = $text_primary
    
    fade_on_empty = false
    font_family = JetBrainsMono Nerd Font Mono
    placeholder_text = <span foreground="##d8dee9"><i>Password...</i></span>
    hide_input = false
    
    position = 0, -8%
    halign = center
    valign = center
    
    rounding = -1
    check_color = $success_color
    fail_color = $error_color
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
}

# --- MEDIA (Bottom Center) ---
label {
    monitor =
    text = cmd[update:1000] ~/scripts/lock-screen-media.sh
    color = $accent_tertiary
    font_size = 24
    font_family = JetBrainsMono Nerd Font Mono
    position = 0, 1.5%
    halign = center
    valign = bottom
}

# --- BATTERY (Bottom Right) ---
label {
    monitor =
    text = cmd[update:30000] ~/scripts/lock-screen-battery.sh
    color = $warning_color
    font_size = 24
    font_family = JetBrainsMono Nerd Font Mono
    position = -1.5%, 1.5%
    halign = right
    valign = bottom
}

# --- HOSTNAME (Bottom Left) ---
label {
    monitor =
    text = cmd[update:60000] echo " $(uname -n)"
    color = $accent_primary
    font_size = 24
    font_family = JetBrainsMono Nerd Font Mono
    position = 1.5%, 1.5%
    halign = left
    valign = bottom
}
