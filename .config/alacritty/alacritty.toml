# Terminal settings
# Window settings
[terminal.shell]
program = "/usr/bin/fish"

[window]
dynamic_padding = true

# Font configuration
[font]
size = 11

[font.normal]
family = "JetBrainsMonoNL Nerd Font Mono"

[font.offset]
x = -1

# Colors (Nord theme)
[colors.primary]
background = "#2E3440"
foreground = "#D8DEE9"

[colors.normal]
black = "#3B4252"
red = "#BF616A"
green = "#A3BE8C"
yellow = "#EBCB8B"
blue = "#81A1C1"
magenta = "#B48EAD"
cyan = "#88C0D0"
white = "#E5E9F0"

[colors.bright]
black = "#4C566A"
red = "#BF616A"
green = "#A3BE8C"
yellow = "#EBCB8B"
blue = "#81A1C1"
magenta = "#B48EAD"
cyan = "#8FBCBB"
white = "#ECEFF4"

# Behavior
[selection]
save_to_clipboard = true

[mouse]
hide_when_typing = true

[scrolling]
multiplier = 10

[bell]
duration = 0
