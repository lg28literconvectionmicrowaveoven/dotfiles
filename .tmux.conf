# Core plugins
set -g @plugin "tmux-plugins/tpm"
set -g @plugin "tmux-plugins/tmux-sensible"
set -g @plugin "arcticicestudio/nord-tmux"

set-option -g default-shell /bin/fish

# Prefix key
set -g prefix M-w
unbind-key C-b
bind-key M-w send-prefix

# Pane navigation (vim-like)
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Pane swapping
bind-key H swap-pane -s "{left-of}"
bind-key J swap-pane -D
bind-key K swap-pane -U
bind-key L swap-pane -s "{right-of}"

# Pane management
bind-key x kill-pane
bind-key r split-window -h -c "#{pane_current_path}"
bind-key d split-window -v -c "#{pane_current_path}"
bind-key m resize-pane -Z

# Window management (C-w prefix table)
bind-key -T root C-w switch-client -T tab-table
bind-key -T tab-table n new-window -c "~/"
bind-key -T tab-table x kill-window
bind-key -T tab-table f break-pane
bind-key -T tab-table r command-prompt -I "#W" "rename-window '%%'"
bind-key -T tab-table 1 select-window -t 1
bind-key -T tab-table 2 select-window -t 2
bind-key -T tab-table 3 select-window -t 3
bind-key -T tab-table 4 select-window -t 4
bind-key -T tab-table 5 select-window -t 5
bind-key -T tab-table 6 select-window -t 6
bind-key -T tab-table 7 select-window -t 7
bind-key -T tab-table 8 select-window -t 8
bind-key -T tab-table 9 select-window -t 9
bind-key -T tab-table 0 select-window -t 0

# Session management (M-s prefix table)
bind-key -T root M-s switch-client -T session-table
bind-key -T session-table n new-session -c "~/"
bind-key -T session-table x kill-session 
bind-key -T session-table s choose-tree -s
bind-key -T session-table r command-prompt -I "#S" "rename-session '%%'"

# General settings
set-option -g status-position top
set -g base-index 1
set -g mouse on
set -g set-clipboard on
set -g focus-events on

# Fix colors for Kitty and other modern terminals
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-kitty:RGB"

# Initialize TPM (keep at bottom)
run "~/.tmux/plugins/tpm/tpm"
